# ForensicSuite - Config: REDES y CAPTURAS DE TRAFICO
# Perfil: Analisis de trafico de red, paquetes, logs de firewall
# Uso: forensic_suite carve <fuente> -c configs/redes.conf

#---------------------------------------------------------------------
# CAPTURAS DE PAQUETES (PCAP)
#---------------------------------------------------------------------
pcap    y   16000000000   \xd4\xc3\xb2\xa1
pcap    y   16000000000   \xa1\xb2\xc3\xd4
pcapng  y   16000000000   \x0a\x0d\x0d\x0a
cap     y   16000000000   \xd4\xc3\xb2\xa1

#---------------------------------------------------------------------
# TRAZAS DE RED (Wireshark, tcpdump)
#---------------------------------------------------------------------
wpcap   y   16000000000   \xd4\xc3\xb2\xa1\x04\x00\x00\x00

#---------------------------------------------------------------------
# LOGS DE FIREWALL / IDS
#---------------------------------------------------------------------
log     y   100000000     Jan
log     y   100000000     Feb
log     y   100000000     Mar
log     y   100000000     Apr
log     y   100000000     May
log     y   100000000     Jun
log     y   100000000     Jul
log     y   100000000     Aug
log     y   100000000     Sep
log     y   100000000     Oct
log     y   100000000     Nov
log     y   100000000     Dec

#---------------------------------------------------------------------
# LOGS DE APLICACION (Apache, Nginx, etc.)
#---------------------------------------------------------------------
access_log  y   100000000   GET
access_log  y   100000000   POST
error_log   y   100000000   [error]
syslog      y   100000000   <

#---------------------------------------------------------------------
# LOGS DE SISTEMA
#---------------------------------------------------------------------
wtmp    y   10000000    \x01\x00\x00\x00
btmp    y   10000000    \x02\x00\x00\x00
lastlog y   10000000    \x00\x00

#---------------------------------------------------------------------
# NETFLOW / FLOW DATA
#---------------------------------------------------------------------
nfsen   y   100000000   \x00\x01\x00\x05
ipfix   y   100000000   \x00\x01\x00\x00

#---------------------------------------------------------------------
# ARCHIVOS DE CONFIGURACION DE RED
#---------------------------------------------------------------------
conf    y   1000000     nameserver
conf    y   1000000     interface
conf    y   1000000     netmask
conf    y   1000000     gateway
conf    y   1000000     dhcp
conf    y   1000000     wlan

#---------------------------------------------------------------------
# BASE DE DATOS DE CONEXIONES
#---------------------------------------------------------------------
sqlite  y   50000000    SQLite format 3\x00

#---------------------------------------------------------------------
# CERTIFICADOS DE RED
#---------------------------------------------------------------------
pem     n   100000      -----BEGIN CERTIFICATE
der     y   100000      \x30\x82
