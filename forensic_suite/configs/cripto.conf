# ForensicSuite - Config: CRIPTOGRAFIA y SEGURIDAD
# Perfil: Claves privadas, certificados, credenciales, tokens
# Uso: forensic_suite carve <fuente> -c configs/cripto.conf
# Critico: Este perfil busca evidencia de acceso no autorizado

#---------------------------------------------------------------------
# CERTIFICADOS X.509
#---------------------------------------------------------------------
pem     n   100000      -----BEGIN CERTIFICATE
pem     n   100000      -----BEGIN X509 CRL
der     y   100000      \x30\x82\x03
der     y   100000      \x30\x82\x02
der     y   100000      \x30\x82\x01

#---------------------------------------------------------------------
# CLAVES PRIVADAS
#---------------------------------------------------------------------
pem     n   100000      -----BEGIN RSA PRIVATE KEY
pem     n   100000      -----BEGIN DSA PRIVATE KEY
pem     n   100000      -----BEGIN EC PRIVATE KEY
pem     n   100000      -----BEGIN ENCRYPTED PRIVATE KEY
pem     n   100000      -----BEGIN PRIVATE KEY
pem     n   100000      -----BEGIN OPENSSH PRIVATE KEY

#---------------------------------------------------------------------
# CLAVES SSH
#---------------------------------------------------------------------
ssh_pub y   10000       ssh-rsa
ssh_pub y   10000       ssh-dss
ssh_pub y   10000       ssh-ed25519
ssh_pub y   10000       ecdsa-sha2
ssh_key y   100000      \x00\x00\x00\x0bssh-rsa
ssh_key y   100000      \x00\x00\x00\x0fssh-ed25519

#---------------------------------------------------------------------
# CLAVES PGP / GPG
#---------------------------------------------------------------------
gpg_pub y   100000      \x99\x00
gpg_sec y   100000      \x95\x01
gpg_sec y   100000      \x95\x00
pgp     y   100000      -----BEGIN PGP PUBLIC KEY BLOCK
pgp     y   100000      -----BEGIN PGP PRIVATE KEY BLOCK
pgp     y   100000      -----BEGIN PGP MESSAGE

#---------------------------------------------------------------------
# HASHES / CONTRASENAS
#---------------------------------------------------------------------
shadow  y   1000000     root:
shadow  y   1000000     daemon:
shadow  y   1000000     nobody:
passwd  y   1000000     root:x:
passwd  y   1000000     daemon:x:
htpasswd y  1000000     admin:
htpasswd y  1000000     root:

#---------------------------------------------------------------------
# TOKENS / CREDENCIALES
#---------------------------------------------------------------------
token   y   100000      eyJ
token   y   100000      Bearer
cookie  y   100000      session_id
cookie  y   100000      auth_token
api_key y   100000      api_key=
api_key y   100000      apikey=
api_key y   100000      API_KEY=

#---------------------------------------------------------------------
# KEYS DE APLICACIONES
#---------------------------------------------------------------------
keychain y  10000000    kSecClass
keychain y  10000000    v_Data
kwallet y   10000000    KWALLETD
firefox y   10000000    \x68\x74\x74\x70\x73\x3a\x2f\x2f
chrome  y   10000000    \x01\x00\x00\x00

#---------------------------------------------------------------------
# WALLET / CRYPTO
#---------------------------------------------------------------------
wallet  y   10000000    \x01\x00\x00\x00\x30\x82
wallet  y   10000000    Bitcoin
wallet  y   10000000    Ethereum
wallet  y   10000000    qtum

#---------------------------------------------------------------------
# BASES DE DATOS DE CREDENCIALES
#---------------------------------------------------------------------
sqlite  y   50000000    SQLite format 3\x00
keychain_db y 10000000  \x62\x70\x6c\x69\x73\x74
firefox_db  y 10000000  \x62\x70\x6c\x69\x73\x74

#---------------------------------------------------------------------
# LOGS DE ACCESO
#---------------------------------------------------------------------
auth_log    y   10000000    Accepted
auth_log    y   10000000    Failed
auth_log    y   10000000    password for
auth_log    y   10000000    session opened
secure_log  y   10000000    sshd\[

#---------------------------------------------------------------------
# ARCHIVOS DE CONFIGURACION CON CREDENCIALES
#---------------------------------------------------------------------
conf    y   100000      password=
conf    y   100000      passwd=
conf    y   100000      secret=
conf    y   100000      api_key=
conf    y   100000      access_token=
conf    y   100000      private_key=
conf    y   100000      DATABASE_URL
conf    y   100000      MYSQL_PWD
conf    y   100000      POSTGRES_PASSWORD
