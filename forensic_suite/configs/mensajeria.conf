# ForensicSuite - Config: MENSAJERIA
# Perfil: Aplicaciones de mensajeria instantanea (WhatsApp, Telegram, Signal, etc.)
# Uso: forensic_suite carve <fuente> -p mensajeria -o <salida>
# Nota: Recupera bases de datos SQLite y archivos asociados. No descifra contenido.

#--------------------------------------------------
# BASES DE DATOS SQLITE (WhatsApp, Telegram, Signal)
#--------------------------------------------------
sqlite  y   100000000   SQLite format 3

#--------------------------------------------------
# BACKUPS Y ARCHIVOS DE MENSAJERIA
#--------------------------------------------------
whatsapp    y   500000000   msgstore
wa      y   100000000   com.whatsapp
tg      y   100000000   telegram
signal  y   100000000   signal

#--------------------------------------------------
# ARCHIVOS DE TEXTO Y LOGS
#--------------------------------------------------
txt     n   10000000    chat
log     n   10000000    message
csv     n   10000000    +58

#--------------------------------------------------
# IMAGENES COMPARTIDAS EN CHATS (JPEG/PNG/GIF)
#--------------------------------------------------
jpg     y   50000000    \xff\xd8\xff\xe0    \xff\xd9
jpg     y   50000000    \xff\xd8\xff\xe1    \xff\xd9
png     y   20000000    \x89PNG\r\n\x1a\n   \x00\x00\x00\x00IEND\xae\x42\x60\x82
gif     y   20000000    GIF87a              \x00\x00\x3b
gif     y   20000000    GIF89a              \x00\x00\x3b

#--------------------------------------------------
# DOCUMENTOS COMPARTIDOS (PDF, DOCX)
#--------------------------------------------------
pdf     y   50000000    %PDF                %EOF\n
docx    y   50000000    PK\x03\x04          [Content_Types].xml
xlsx    y   50000000    PK\x03\x04          [Content_Types].xml
pptx    y   50000000    PK\x03\x04          [Content_Types].xml
