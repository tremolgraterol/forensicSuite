# ForensicSuite - Config: DOCUMENTOS y OFIMATICA
# Perfil: Documentos de oficina, textos, correos electronicos
# Uso: forensic_suite carve <fuente> -c configs/documentos.conf

#---------------------------------------------------------------------
# PDF
#---------------------------------------------------------------------
pdf     y   50000000    %PDF    %EOF\x0d    REVERSE
pdf     y   50000000    %PDF    %EOF\x0a    REVERSE

#---------------------------------------------------------------------
