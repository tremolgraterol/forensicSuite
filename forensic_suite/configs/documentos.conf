xlsx    y   10000000    PK\x03\x04    [Content_Types].xml
pptx    y   10000000    PK\x03\x04    [Content_Types].xml
docm    y   10000000    PK\x03\x04    [Content_Types].xml
xlsm    y   10000000    PK\x03\x04    [Content_Types].xml
dotx    y   10000000    PK\x03\x04    [Content_Types].xml

