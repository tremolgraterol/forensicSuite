name: Build ForensicSuite for Windows

on:
  push:
    tags:
      - 'v*windows*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag o nombre del release (ej: v2.0.0-windows)'
        required: true
        default: 'v2.0.0-windows'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller volatility3 pefile
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: |
          pyinstaller forensic_suite.spec --clean
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }

      - name: Verify build output
        run: |
          if (-not (Test-Path dist/forensic_suite.exe)) {
            throw "forensic_suite.exe not found"
          }
          Get-ChildItem dist/*.exe

      - name: Create ZIP archive
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          Compress-Archive -Path dist/forensic_suite.exe -DestinationPath "forensic_suite_windows.zip" -Force
          Get-Item forensic_suite_windows.zip

      - name: Generate SHA-256 checksums
        run: |
          Get-FileHash dist/forensic_suite.exe -Algorithm SHA256 | Select-Object Hash > forensic_suite.exe.sha256
          Get-FileHash forensic_suite_windows.zip -Algorithm SHA256 | Select-Object Hash >> forensic_suite.exe.sha256
          Get-Content forensic_suite.exe.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: forensic_suite_windows
          path: |
            dist/forensic_suite.exe
            forensic_suite_windows.zip
            forensic_suite.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ForensicSuite ${{ github.event.inputs.tag || github.ref_name }} — Windows
          body: |
            Version Windows portable de ForensicSuite.

            ### Archivos
            - `forensic_suite.exe`: ejecutable portable
            - `forensic_suite_windows.zip`: ejecutable + dependencias
            - `forensic_suite.exe.sha256`: hashes de verificacion

            ### Uso rapido
            ```powershell
            forensic_suite.exe --help
            forensic_suite.exe hash evidencia.raw
            forensic_suite.exe memoria --analizar --dump memoria.raw -p windows.pslist
            ```

            Instrucciones completas en [`docs/INSTALACION_WINDOWS.md`](docs/INSTALACION_WINDOWS.md).
          files: |
            dist/forensic_suite.exe
            forensic_suite_windows.zip
            forensic_suite.exe.sha256
          fail_on_unmatched_files: true
